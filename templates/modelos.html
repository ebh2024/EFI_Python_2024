{% extends "base_template.html" %}
{% block content %}
<h2>Modelos</h2>
<a href="{{ url_for('new_modelo') }}" class="btn btn-primary">Nuevo Modelo</a>
<table class="table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Fabricante</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    {% for modelo in modelos %}
    <tr>
      <td>{{ modelo.id }}</td>
      <td>{{ modelo.nombre }}</td>
      <td>{{ modelo.fabricante.nombre }}</td>
      <td>
        <a href="{{ url_for('update_modelo', id=modelo.id) }}" class="btn btn-warning">Editar</a>
        <form action="{{ url_for('delete_modelo', id=modelo.id) }}" method="POST" style="display:inline;">
          <button type="submit" class="btn btn-danger">Eliminar</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
