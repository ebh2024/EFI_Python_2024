{% extends "base_template.html" %}
{% block content %}
    <div class="container">
        <h2 class="mt-4">Características</h2>
        <a href="{{ url_for('new_caracteristica') }}" class="btn btn-primary mb-3">Añadir Característica</a>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo</th>
                    <th>Descripción</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for caracteristica in caracteristicas %}
                <tr>
                    <td>{{ caracteristica.id }}</td>
                    <td>{{ caracteristica.tipo }}</td>
                    <td>{{ caracteristica.descripcion }}</td>
                    <td>
                        <a href="{{ url_for('edit_caracteristica', id=caracteristica.id) }}" class="btn btn-warning btn-sm">Editar</a>
                        <a href="{{ url_for('delete_caracteristica', id=caracteristica.id) }}" class="btn btn-danger btn-sm">Eliminar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
