{% extends "base_template.html" %}
{% block content %}
<h2>Proveedores</h2>
<table class="table">
    <thead>
        <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Contacto</th>
        </tr>
    </thead>
    <tbody>
        {% for proveedor in proveedores %}
        <tr>
        <td>{{ proveedor.id }}</td>
        <td>{{ proveedor.nombre }}</td>
        <td>{{ proveedor.contacto }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
