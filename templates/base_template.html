<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <title>EFI</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="{{ url_for('home') }}">Inicio</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('equipos') }}">Equipos</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('modelos') }}">Modelos</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('categorias') }}">Categorías</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('fabricantes') }}">Fabricantes</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('caracteristicas') }}">Características</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('stocks') }}">Stocks</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('proveedores') }}">Proveedores</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('accesorios') }}">Accesorios</a></li>
        </ul>
    </div>
    </nav>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
    <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
