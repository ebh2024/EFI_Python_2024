{% extends "base_template.html" %}
{% block content %}
    <div class="container">
        <h2 class="mt-4">Stocks</h2>
        <a href="{{ url_for('new_stock') }}" class="btn btn-primary mb-3">Añadir Stock</a>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cantidad</th>
                    <th>Ubicación</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for stock in stocks %}
                <tr>
                    <td>{{ stock.id }}</td>
                    <td>{{ stock.cantidad }}</td>
                    <td>{{ stock.ubicacion }}</td>
                    <td>
                        <a href="{{ url_for('edit_stock', id=stock.id) }}" class="btn btn-warning btn-sm">Editar</a>
                        <a href="{{ url_for('delete_stock', id=stock.id) }}" class="btn btn-danger btn-sm">Eliminar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
