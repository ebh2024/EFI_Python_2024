{% extends "base_template.html" %}
{% block content %}
<h2>Equipos</h2>
<table class="table">
    <thead>
        <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Modelo</th>
        <th>Categoría</th>
        <th>Costo</th>
        </tr>
    </thead>
    <tbody>
        {% for equipo in equipos %}
        <tr>
        <td>{{ equipo.id }}</td>
        <td>{{ equipo.nombre }}</td>
        <td>{{ equipo.modelo.nombre }}</td>
        <td>{{ equipo.categoria.nombre }}</td>
        <td>{{ equipo.costo }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
