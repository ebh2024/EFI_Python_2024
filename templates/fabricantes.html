{% extends "base_template.html" %}
{% block content %}
<h2>Fabricantes</h2>
<table class="table">
    <thead>
        <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>País de Origen</th>
        </tr>
    </thead>
    <tbody>
        {% for fabricante in fabricantes %}
        <tr>
        <td>{{ fabricante.id }}</td>
        <td>{{ fabricante.nombre }}</td>
        <td>{{ fabricante.pais_de_origen }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
