{% extends "base_template.html" %}
{% block content %}
    <div class="container">
        <h2 class="mt-4">Fabricantes</h2>
        <a href="{{ url_for('new_fabricante') }}" class="btn btn-primary mb-3">Añadir Fabricante</a>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>País de Origen</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for fabricante in fabricantes %}
                <tr>
                    <td>{{ fabricante.id }}</td>
                    <td>{{ fabricante.nombre }}</td>
                    <td>{{ fabricante.pais_origen }}</td>
                    <td>
                        <a href="{{ url_for('edit_fabricante', id=fabricante.id) }}" class="btn btn-warning btn-sm">Editar</a>
                        <form action="{{ url_for('delete_fabricante', id=fabricante.id) }}" method="POST" style="display:inline;">
                            <button type="submit" class="btn btn-danger">Eliminar</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
